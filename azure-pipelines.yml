trigger:
- main

pool:
  name: dockeragent

steps:

# Checkout Repository
- checkout: self

# Debug Repository Structure
- task: PowerShell@2
  displayName: 'Show Terraform Files'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Build.SourcesDirectory = $(Build.SourcesDirectory)"
      Get-ChildItem "$(Build.SourcesDirectory)" -Recurse

# Install Terraform
- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.10.5'

# Verify Python
- task: PowerShell@2
  displayName: 'Verify Python'
  inputs:
    targetType: 'inline'
    script: |
      python --version
      pip --version

# Install Checkov
- task: PowerShell@2
  displayName: 'Install Checkov'
  inputs:
    targetType: 'inline'
    script: |
      python -m pip install --upgrade pip
      pip install checkov
      checkov --version

# Install TFLint
- task: PowerShell@2
  displayName: 'Install TFLint'
  inputs:
    targetType: 'inline'
    script: |
      $tflintVersion = "0.50.3"
      $url = "https://github.com/terraform-linters/tflint/releases/download/v${tflintVersion}/tflint_windows_amd64.zip"
      $zipPath = "$env:TEMP\tflint.zip"
      $extractPath = "C:\tools\tflint"
      
      Write-Host "Downloading TFLint v${tflintVersion}..."
      Invoke-WebRequest -Uri $url -OutFile $zipPath
      
      if (!(Test-Path $extractPath)) {
        New-Item -ItemType Directory -Path $extractPath | Out-Null
      }
      
      Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
      
      $env:PATH = "$extractPath;$env:PATH"
      [System.Environment]::SetEnvironmentVariable("PATH", "$extractPath;$([System.Environment]::GetEnvironmentVariable('PATH', 'Machine'))", "Machine")
      
      Write-Host "TFLint installed:"
      & "$extractPath\tflint.exe" --version

# Install tfsec
- task: PowerShell@2
  displayName: 'Install tfsec'
  inputs:
    targetType: 'inline'
    script: |
      $tfsecVersion = "1.28.11"
      $url = "https://github.com/aquasecurity/tfsec/releases/download/v${tfsecVersion}/tfsec-windows-amd64.exe"
      $destPath = "C:\tools\tfsec"
      
      Write-Host "Downloading tfsec v${tfsecVersion}..."
      
      if (!(Test-Path $destPath)) {
        New-Item -ItemType Directory -Path $destPath | Out-Null
      }
      
      Invoke-WebRequest -Uri $url -OutFile "$destPath\tfsec.exe"
      
      [System.Environment]::SetEnvironmentVariable("PATH", "$destPath;$([System.Environment]::GetEnvironmentVariable('PATH', 'Machine'))", "Machine")
      $env:PATH = "$destPath;$env:PATH"
      
      Write-Host "tfsec installed:"
      & "$destPath\tfsec.exe" --version

# Terraform Init
- task: TerraformTask@5
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    backendServiceArm: 'automation'
    backendAzureRmStorageAccountName: 'gauravbackupstorage'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'backup.tfstate'

# Terraform Validate
- task: TerraformTask@5
  displayName: 'Terraform Validate'
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'

# Run TFLint
- task: PowerShell@2
  displayName: 'Run TFLint'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $env:PATH = "C:\tools\tflint;$env:PATH"
      
      Write-Host "Initializing TFLint plugins..."
      tflint --init
      
      Write-Host "Running TFLint..."
      tflint --format=default
      
      if ($LASTEXITCODE -ne 0) {
        Write-Error "TFLint found issues. Failing pipeline."
        exit 1
      }
      Write-Host "TFLint passed successfully."

# Run tfsec
- task: PowerShell@2
  displayName: 'Run tfsec'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $env:PATH = "C:\tools\tfsec;$env:PATH"
      
      Write-Host "Running tfsec..."
      tfsec . --format lovely
      
      if ($LASTEXITCODE -ne 0) {
        Write-Error "tfsec found security issues. Failing pipeline."
        exit 1
      }
      Write-Host "tfsec passed successfully."

# Run Checkov
- task: PowerShell@2
  displayName: 'Run Checkov'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      Write-Host "Running Checkov..."
      checkov -d . --framework terraform
      
      if ($LASTEXITCODE -ne 0) {
        Write-Error "Checkov found policy violations. Failing pipeline."
        exit 1
      }
      Write-Host "Checkov passed successfully."

# Terraform Plan
- task: TerraformTask@5
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    environmentServiceNameAzureRM: 'automation'

# Terraform Apply
- task: TerraformTask@5
  displayName: 'Terraform Apply'
  condition: succeeded()
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    environmentServiceNameAzureRM: 'automation'
