trigger:
- main

pool:
  name: dockeragent

steps:

# Checkout Code
- checkout: self

# Debug Repository
- task: PowerShell@2
  displayName: 'Show Repository Files'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Source Directory: $(Build.SourcesDirectory)"
      Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse

# Install Terraform
- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.10.5'

# Verify Python
- task: PowerShell@2
  displayName: 'Verify Python'
  inputs:
    targetType: 'inline'
    script: |
      python --version
      pip --version

# Install Checkov
- task: PowerShell@2
  displayName: 'Install Checkov'
  inputs:
    targetType: 'inline'
    script: |
      python -m pip install --upgrade pip
      pip install checkov
      checkov --version

# Install TFLint
- task: PowerShell@2
  displayName: 'Install TFLint'
  inputs:
    targetType: 'inline'
    script: |
      winget install --id TerraformLinters.TFLint -e --accept-package-agreements --accept-source-agreements
      tflint --version

# Install tfsec
- task: PowerShell@2
  displayName: 'Install tfsec'
  inputs:
    targetType: 'inline'
    script: |
      winget install --id AquaSecurity.tfsec -e --accept-package-agreements --accept-source-agreements
      tfsec --version

# Terraform Init
- task: TerraformTask@5
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)'
    backendServiceArm: 'automation'
    backendAzureRmStorageAccountName: 'gauravbackupstorage'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'backup.tfstate'

# Terraform Validate
- task: TerraformTask@5
  displayName: 'Terraform Validate'
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(Build.SourcesDirectory)'

# Run TFLint
- task: PowerShell@2
  displayName: 'Run TFLint'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      tflint --init
      tflint
      if ($LASTEXITCODE -ne 0) {
        Write-Error "TFLint failed"
        exit 1
      }

# Run tfsec
- task: PowerShell@2
  displayName: 'Run tfsec'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      tfsec .
      if ($LASTEXITCODE -ne 0) {
        Write-Error "tfsec failed"
        exit 1
      }

# Run Checkov
- task: PowerShell@2
  displayName: 'Run Checkov'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      checkov -d .
      if ($LASTEXITCODE -ne 0) {
        Write-Error "Checkov failed"
        exit 1
      }

# Terraform Plan
- task: TerraformTask@5
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(Build.SourcesDirectory)'
    environmentServiceNameAzureRM: 'automation'

# Terraform Apply
- task: TerraformTask@5
  displayName: 'Terraform Apply'
  condition: succeeded()
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(Build.SourcesDirectory)'
    environmentServiceNameAzureRM: 'automation'