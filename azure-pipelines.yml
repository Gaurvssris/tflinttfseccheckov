
trigger:
- main

pool:
  name: dockeragent

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.10.5'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)/TERRAFORMSECURITY'
    backendServiceArm: 'automation'
    backendAzureRmStorageAccountName: 'gauravbackupstorage'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'backup.tfstate'