trigger:
- main

pool:
  name: dockeragent

steps:

# Terraform Install
- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.10.5'

# Terraform Init
- task: TerraformTask@5
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)'
    backendServiceArm: 'automation'
    backendAzureRmStorageAccountName: 'gauravbackupstorage'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'backup.tfstate'

# Terraform Validate
- task: TerraformTask@5
  displayName: 'Terraform Validate'
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(Build.SourcesDirectory)'

# Install TFLint
- task: PowerShell@2
  displayName: 'Install TFLint'
  inputs:
    targetType: 'inline'
    script: |
      choco install tflint -y
      tflint --version

# Run TFLint
- task: PowerShell@2
  displayName: 'Run TFLint'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      tflint --init
      tflint

# Install tfsec
- task: PowerShell@2
  displayName: 'Install tfsec'
  inputs:
    targetType: 'inline'
    script: |
      choco install tfsec -y
      tfsec --version

# Run tfsec
- task: PowerShell@2
  displayName: 'Run tfsec'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      tfsec .

# Install Checkov
- task: PowerShell@2
  displayName: 'Install Checkov'
  inputs:
    targetType: 'inline'
    script: |
      python -m pip install --upgrade pip
      pip install checkov
      checkov --version

# Run Checkov
- task: PowerShell@2
  displayName: 'Run Checkov'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      checkov -d .

# Terraform Plan
- task: TerraformTask@5
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(Build.SourcesDirectory)'
    environmentServiceNameAzureRM: 'automation'

# Terraform Apply
- task: TerraformTask@5
  displayName: 'Terraform Apply'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(Build.SourcesDirectory)'
    environmentServiceNameAzureRM: 'automation'