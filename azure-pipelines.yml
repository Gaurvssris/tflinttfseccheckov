trigger:
- main

pool:
  name: dockeragent

steps:

# Checkout Repository
- checkout: self

# Debug Repository Structure
- task: PowerShell@2
  displayName: 'Show Terraform Files'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Build.SourcesDirectory = $(Build.SourcesDirectory)"
      Get-ChildItem "$(Build.SourcesDirectory)" -Recurse

# Install Terraform
- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.10.5'

# Verify Terraform
- task: PowerShell@2
  displayName: 'Verify Terraform'
  inputs:
    targetType: 'inline'
    script: |
      $tfPath = Get-ChildItem -Path "$(Agent.ToolsDirectory)\terraform" -Recurse -Filter "terraform.exe" | Select-Object -First 1
      if ($tfPath) {
        Write-Host "Terraform found at: $($tfPath.FullName)"
        $env:PATH = "$($tfPath.DirectoryName);$env:PATH"
        terraform --version
      } else {
        Write-Error "Terraform executable not found!"
        exit 1
      }

# Verify Python
- task: PowerShell@2
  displayName: 'Verify Python'
  inputs:
    targetType: 'inline'
    script: |
      python --version
      pip --version

# Install Checkov
- task: PowerShell@2
  displayName: 'Install Checkov'
  inputs:
    targetType: 'inline'
    script: |
      python -m pip install --upgrade pip
      pip install checkov
      checkov --version

# Install TFLint
- task: PowerShell@2
  displayName: 'Install TFLint'
  inputs:
    targetType: 'inline'
    script: |
      $tflintVersion = "0.50.3"
      $url = "https://github.com/terraform-linters/tflint/releases/download/v${tflintVersion}/tflint_windows_amd64.zip"
      $zipPath = "$env:TEMP\tflint.zip"
      $extractPath = "C:\tools\tflint"

      Write-Host "Downloading TFLint v${tflintVersion}..."
      Invoke-WebRequest -Uri $url -OutFile $zipPath

      if (!(Test-Path $extractPath)) {
        New-Item -ItemType Directory -Path $extractPath | Out-Null
      }

      Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
      $env:PATH = "$extractPath;$env:PATH"

      Write-Host "TFLint installed:"
      & "$extractPath\tflint.exe" --version

# Install tfsec
- task: PowerShell@2
  displayName: 'Install tfsec'
  inputs:
    targetType: 'inline'
    script: |
      $tfsecVersion = "1.28.11"
      $url = "https://github.com/aquasecurity/tfsec/releases/download/v${tfsecVersion}/tfsec-windows-amd64.exe"
      $destPath = "C:\tools\tfsec"

      Write-Host "Downloading tfsec v${tfsecVersion}..."

      if (!(Test-Path $destPath)) {
        New-Item -ItemType Directory -Path $destPath | Out-Null
      }

      Invoke-WebRequest -Uri $url -OutFile "$destPath\tfsec.exe"
      $env:PATH = "$destPath;$env:PATH"

      Write-Host "tfsec installed:"
      & "$destPath\tfsec.exe" --version

# Terraform Init
- task: PowerShell@2
  displayName: 'Terraform Init'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $tfPath = Get-ChildItem -Path "$(Agent.ToolsDirectory)\terraform" -Recurse -Filter "terraform.exe" | Select-Object -First 1
      $env:PATH = "$($tfPath.DirectoryName);$env:PATH"

      terraform init `
        -backend-config="storage_account_name=gauravbackupstorage" `
        -backend-config="container_name=tfstate" `
        -backend-config="key=backup.tfstate" `
        -backend-config="resource_group_name=$(backendResourceGroup)" `
        -backend-config="subscription_id=$(subscriptionId)" `
        -backend-config="tenant_id=$(tenantId)" `
        -backend-config="client_id=$(clientId)" `
        -backend-config="client_secret=$(clientSecret)"

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Terraform Init failed."
        exit 1
      }
      Write-Host "Terraform Init passed successfully."

# Terraform Validate
- task: PowerShell@2
  displayName: 'Terraform Validate'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $tfPath = Get-ChildItem -Path "$(Agent.ToolsDirectory)\terraform" -Recurse -Filter "terraform.exe" | Select-Object -First 1
      $env:PATH = "$($tfPath.DirectoryName);$env:PATH"

      terraform validate

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Terraform Validate failed."
        exit 1
      }
      Write-Host "Terraform Validate passed successfully."

# Run TFLint
- task: PowerShell@2
  displayName: 'Run TFLint'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $env:PATH = "C:\tools\tflint;$env:PATH"

      Write-Host "Initializing TFLint plugins..."
      tflint --init

      Write-Host "Running TFLint..."
      tflint --format=default

      if ($LASTEXITCODE -ne 0) {
        Write-Error "TFLint found issues. Failing pipeline."
        exit 1
      }
      Write-Host "TFLint passed successfully."

# Run tfsec
- task: PowerShell@2
  displayName: 'Run tfsec'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $env:PATH = "C:\tools\tfsec;$env:PATH"

      Write-Host "Running tfsec..."
      tfsec . --format lovely

      if ($LASTEXITCODE -ne 0) {
        Write-Error "tfsec found security issues. Failing pipeline."
        exit 1
      }
      Write-Host "tfsec passed successfully."

# Run Checkov
- task: PowerShell@2
  displayName: 'Run Checkov'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      Write-Host "Running Checkov..."
      checkov -d . --framework terraform

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Checkov found policy violations. Failing pipeline."
        exit 1
      }
      Write-Host "Checkov passed successfully."

# Terraform Plan
- task: PowerShell@2
  displayName: 'Terraform Plan'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $tfPath = Get-ChildItem -Path "$(Agent.ToolsDirectory)\terraform" -Recurse -Filter "terraform.exe" | Select-Object -First 1
      $env:PATH = "$($tfPath.DirectoryName);$env:PATH"

      terraform plan

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Terraform Plan failed."
        exit 1
      }
      Write-Host "Terraform Plan passed successfully."

# Terraform Apply
- task: PowerShell@2
  displayName: 'Terraform Apply'
  condition: succeeded()
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)/tflinttfseccheckov'
    script: |
      $tfPath = Get-ChildItem -Path "$(Agent.ToolsDirectory)\terraform" -Recurse -Filter "terraform.exe" | Select-Object -First 1
      $env:PATH = "$($tfPath.DirectoryName);$env:PATH"

      terraform apply -auto-approve

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Terraform Apply failed."
        exit 1
      }
      Write-Host "Terraform Apply passed successfully."
